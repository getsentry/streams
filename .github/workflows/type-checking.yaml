name: type-checking
on:
  push:
    branches:
      - main
      - release-sentry-streams/**
  pull_request:

jobs:
  typing:
    name: "mypy typing"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Make environment
        run: make install-dev

      - name: Run strict mypy
        run: make typecheck
