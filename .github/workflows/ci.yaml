name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - release-sentry-streams/**
      - release-sentry-streams-k8s/**
  pull_request:

jobs:
  tests:
    name: "Run tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: sentry_streams/.python-version

      - name: Make environment
        run: |
          make install-dev

      - name: Run streams test
        run: make tests-streams

      - name: Run k8s test
        run: make tests-k8s

  integration-tests:
    name: "Run integration tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version-file: sentry_streams/.python-version

      - name: Make environment
        run: |
          make install-dev

      - name: Install devservices
        run: |
          pip install devservices

      - name: Start services
        id: setup
        run: |
          devservices up

      - name: Install local package
        run: |
          pip install -e sentry_streams/.

      - name: Run integration tests
        run: make tests-integration
