# Default configuration
# As of now, the assumption is that local adapters (like Arroyo)
# do not require overrides of this file
env: {}
metrics:
  type: datadog
  host: datadog-agent
  port: 8125
  tags:
    sentry_region: sandbox
    pipeline: spans
pipeline:
  adapter_config:
    arroyo:
      write_healthcheck: true
      metrics_sample_rate: 0.001
  segments:
    - steps_config:
        kafka:
          starts_segment: True
          bootstrap_servers: ["kafka-test-2-001:9092","kafka-test-3-001:9092","kafka-test-4-001:9092"]
        #do_nothing2:
        #  starts_segment: True
        batched_messages:
          batch_size: 250000
          batch_timedelta:
            seconds: 20
        #transform:
        #  starts_segment: True
        #  parallelism:
        #    multi_process:
        #      processes: 8
        #      batch_size: 200000
        #      batch_time: 10
