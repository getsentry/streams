# Example: override_params (e.g. max.poll.interval.ms) from environment variable.
# Run with: MAX_POLL_INTERVAL_MS=300000 python -m sentry_streams.runner \
#   --config path/to/deployment_config/envvars.yaml \
#   --adapter rust_arroyo path/to/examples/simple_map_filter.py
env: {}
metrics:
  type: dummy
pipeline:
  segments:
    - steps_config:
        myinput:
          starts_segment: true
          bootstrap_servers: ["127.0.0.1:9092"]
          override_params:
            max.poll.interval.ms: "${envvar:MAX_POLL_INTERVAL_MS}"
        mysink:
          bootstrap_servers: ["127.0.0.1:9092"]
