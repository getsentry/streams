
# Default configuration
# As of now, the assumption is that local adapters (like Arroyo)
# do not require overrides of this file
env: {}
metrics:
  type: datadog
  host: datadog-agent
  port: 8125
  tags:
    sentry_region: sandbox
    pipeline: filter_profile
pipeline:
  adapter_config:
    arroyo:
      write_healthcheck: true
  segments:
    - steps_config:
        myinput:
          starts_segment: True
          bootstrap_servers: ["kafka-test-2-001:9092","kafka-test-3-001:9092","kafka-test-4-001:9092"]
        transform:
          starts_segment: True
          parallelism:
            multi_process:
              processes: 4
              batch_size: 1000
              batch_time: 1
        mybatch:
          batch_size: 6000
          batch_timedelta:
            seconds: 5
